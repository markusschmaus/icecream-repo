<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cream & Milk Ratio Calculator</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="card">
    <nav class="tool-nav"><a href="formulation.html">Full formulation calculator (Fat/TS/POD/PAC) &rarr;</a></nav>
    <h1>Cream &amp; Milk Ratio Calculator</h1>
    <p class="subtitle">Mix 30% cream with 1.5% milk to hit a target fat %.</p>

    <form id="calc-form">
      <div class="field">
        <label for="volume">Desired total volume</label>
        <div class="input-group">
          <input type="number" id="volume" min="0" step="any" value="1000" required>
          <select id="unit">
            <option value="ml">ml</option>
            <option value="L">L</option>
          </select>
        </div>
      </div>

      <div class="field">
        <label for="target-fat">Target fat % of total</label>
        <div class="input-group">
          <input type="number" id="target-fat" min="1.5" max="30" step="0.1" value="10" required>
          <span class="unit-label">%</span>
        </div>
      </div>

      <details class="advanced">
        <summary>Advanced: fat content of ingredients</summary>
        <div class="field">
          <label for="cream-fat">Cream fat %</label>
          <div class="input-group">
            <input type="number" id="cream-fat" min="0" max="100" step="0.1" value="30">
            <span class="unit-label">%</span>
          </div>
        </div>
        <div class="field">
          <label for="milk-fat">Milk fat %</label>
          <div class="input-group">
            <input type="number" id="milk-fat" min="0" max="100" step="0.1" value="1.5">
            <span class="unit-label">%</span>
          </div>
        </div>
      </details>
    </form>

    <div id="error" class="error" hidden></div>

    <div id="result" class="result">
      <div class="result-row">
        <span class="result-label">Cream (30%)</span>
        <span id="cream-amount" class="result-value">-</span>
      </div>
      <div class="result-row">
        <span class="result-label">Milk (1.5%)</span>
        <span id="milk-amount" class="result-value">-</span>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
